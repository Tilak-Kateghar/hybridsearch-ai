<!DOCTYPE html>
<html>
<head>
  <title>HybridSearch AI</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 360px;
      height: 520px;
      display: flex;
      flex-direction: column;
      background: #f7f7f8;
    }

    /* HEADER */
    .header {
      padding: 10px;
      text-align: center;
      font-weight: 600;
      border-bottom: 1px solid #e5e5e5;
      background: white;
    }

    /* CHAT AREA */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .bubble {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      font-size: 13px;
      line-height: 1.5;
    }

    .bubble.user {
      background: #2e7d32;
      color: white;
    }

    .section {
      margin-top: 8px;
    }

    .title {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 4px;
      color: #555;
    }

    ul {
      padding-left: 16px;
      margin: 0;
    }

    li {
      margin-bottom: 4px;
    }

    /* INPUT AREA */
    .input-container {
      display: flex;
      border-top: 1px solid #e5e5e5;
      padding: 8px;
      background: white;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px;
      font-size: 13px;
      height: 40px;
    }

    button {
      margin-left: 6px;
      border: none;
      background: #2e7d32;
      color: white;
      border-radius: 8px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
    }

    /* LOADER */
    .loader {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="header"> <h2>HybridSearch AI</h2>
  <h4> Ask anything from any page containing text or a YouTube Video</h4>

  </div>
  
  <div id="chat"></div>

  <div class="input-container">
    <textarea id="query" placeholder="Ask anything..."></textarea>
    <button id="askBtn">Send</button>
  </div>

  <script src="popup.js"></script>

</body>
</html>
